name: 🐛 Bug report
description: NetMedic did the wrong thing or threw an error.
title: "[Bug] "
labels: ["bug", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! A clear repro saves a lot of back-and-forth.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
      placeholder: When I run `python run.py force-doh`, …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands you ran (with or without `--admin`).
      render: shell
      placeholder: |
        cd D:\NetMedic
        python run.py force-doh
    validations:
      required: true

  - type: textarea
    id: status-output
    attributes:
      label: Output of `python run.py status`
      render: text
    validations:
      required: true

  - type: textarea
    id: check-output
    attributes:
      label: Output of `python run.py check` (you can redact your IPv4)
      render: text
    validations:
      required: false

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Run `winver` and paste the build, e.g. "Windows 11 Pro 24H2 (26200.1)".
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "`python --version`"
    validations:
      required: true

  - type: dropdown
    id: network-topology
    attributes:
      label: Network topology
      options:
        - Direct ISP (no router intercept)
        - Soft router with bypass rules (chnroutes etc.)
        - VPN client on PC
        - Proxy / Clash / SwitchyOmega on PC
        - Other (describe)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log / traceback (if any)
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Confirm
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I've redacted any sensitive info from the output above.
          required: true
