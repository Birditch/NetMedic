name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile + lint (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        # Minimum supported Python is 3.10 — driven by dnspython >=2.8
        # and typer >=0.25, both of which require Python >= 3.10.
        python-version: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (latest compatible)
        run: pip install --upgrade -r requirements.txt

      - name: Compile-check all sources
        run: python -m compileall -q netmedic

      - name: pyflakes
        run: |
          pip install --upgrade pyflakes
          pyflakes netmedic

      - name: Validate locale JSONs
        shell: python
        run: |
          import json, sys
          from pathlib import Path
          required = {
              "app.tagline", "cmd.check.help", "cmd.force-doh.help",
              "msg.need_admin", "msg.choose_primary",
              "label.adapter", "label.col.provider",
          }
          missing = {}
          for p in Path("locales").glob("*.json"):
              data = json.loads(p.read_text(encoding="utf-8"))
              gone = required - set(data.keys())
              if gone:
                  missing[p.name] = sorted(gone)
          if missing:
              for f, keys in missing.items():
                  print(f"::error file={f}::Missing keys: {keys}")
              sys.exit(1)
          print("All locale files contain the required keys.")

      - name: Smoke-test CLI help
        run: python run.py --help
